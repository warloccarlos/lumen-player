<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumen | Privacy-Focused Player</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    
    <link href="video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">LUMEN</div>
        <div class="header-actions">
            <div class="remote-loader">
                <input type="text" id="remoteUrl" placeholder="Paste Video URL...">
                <button id="loadRemote" class="btn-primary">Load</button>
            </div>
            <label for="fileInput" class="upload-label">Add Media</label>
            <input type="file" id="fileInput" multiple accept="video/*" style="display: none;">
            <button id="togglePlaylist" class="btn-secondary">Playlist</button>
            <button id="helpBtn" class="btn-secondary">?</button>
        </div>
    </header>

    <section class="info-bar">
        <p>⚡ <b>Privacy Note:</b> All media is processed locally. <b>MP4</b> loads instantly; <b>MKV</b> may take a few seconds to index.</p>
    </section>

    <main class="main-container">
        <div class="player-wrapper">
            <video id="lumen-player" class="video-js vjs-big-play-centered" controls preload="auto" crossorigin="anonymous"></video>
        </div>

        <aside class="playlist" id="sidebar">
            <div class="playlist-header">UP NEXT</div>
            <ul id="playlist"></ul>
        </aside>
    </main>

    <div id="helpModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>SHORTCUTS</h3>
                <button id="closeHelp" class="remove-btn" style="font-size: 1.5rem;">&times;</button>
            </div>
            <div class="shortcut-list">
                <div class="shortcut-item"><span>Space</span> <span>Play/Pause</span></div>
                <div class="shortcut-item"><span>F</span> <span>Fullscreen</span></div>
                <div class="shortcut-item"><span>M</span> <span>Mute</span></div>
                <div class="shortcut-item"><span>Double Tap</span> <span>Seek 10s</span></div>
            </div>
        </div>
    </div>

    <script src="video.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
