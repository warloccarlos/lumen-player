<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen Player</title>

<link rel="stylesheet" href="video-js.css" />
<link rel="stylesheet" href="style.css">

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('PWA Registered'))
      .catch(err => console.log(err));
  });
}
</script>
</head>

<body>

<header>
  <div class="logo">LUMEN</div>

  <div class="header-actions">
    <input type="file" id="fileInput" accept="video/*">
    <button id="helpBtn">?</button>
  </div>
</header>

<main class="main-container">
  <div class="player-wrapper">
    <video id="mainVideo" class="video-js vjs-big-play-centered" controls></video>
  </div>
</main>

<!-- DISCLAIMER MODAL -->
<div id="disclaimerModal" class="modal-overlay">
  <div class="modal-content">
    <h3>⚡ PERFORMANCE NOTE</h3>
    <p>
      MP4/WebM loads instantly.<br>
      MKV may take time.<br><br>
      100% local playback.
    </p>
    <button id="closeDisclaimer">Got it!</button>
  </div>
</div>

<script src="video.min.js"></script>
<script src="script.js"></script>

</body>
</html>
