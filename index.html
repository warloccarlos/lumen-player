<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> Lumen | Local/Remote Media Player</title>
    <link rel="stylesheet" href="video-js.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Lumen PWA Registered!'))
                .catch(err => console.log('PWA Registration failed', err));
            });
        }
    </script>
</head>
<body>

<header>
    <div class="logo"><img src="lumen_logo.png" width="25" height="25" alt="Lumen Logo">&nbsp;LUMEN</div>
    <div class="header-actions">
        <div class="remote-loader">
            <input type="text" id="remoteUrl" placeholder="Enter Video URL (mp4, m3u8, etc.)">
            <button id="loadRemoteBtn" class="btn-secondary">Load URL</button>
        </div>

        <label for="fileInput" class="upload-label">Add Media</label>
        <input type="file" id="fileInput" accept="video/*" multiple>
        <button id="togglePlaylist" class="btn-secondary">Hide Playlist</button>
        <button id="helpBtn" class="btn-secondary" style="border-radius: 50%; width: 35px; height: 35px; padding: 0;">?</button>
    </div>
</header>

<main class="main-container">
    <div class="player-wrapper" id="playerContainer">
        <video id="mainVideo" class="video-js vjs-big-play-centered" controls preload="auto" crossorigin="anonymous">
            <p class="vjs-no-js">To view this video please enable JavaScript</p>
        </video>
    </div>

    <aside class="playlist">
        <div class="playlist-header">
            <h3>PLAYLIST</h3>
            <span id="itemCount">0 Items</span>
            <button id="clearPlaylist" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:0.7rem; margin-left:10px;">CLEAR ALL</button>
        </div>
        <div id="playlistItems">
            </div>
    </aside>
</main>

<div id="helpModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>LUMEN SHORTCUTS</h3>
            <button id="closeHelp" class="remove-btn">&times;</button>
        </div>
        <div class="shortcut-list">
            <div class="shortcut-item"><span>Space</span> <span>Play / Pause</span></div>
            <div class="shortcut-item"><span>F</span> <span>Fullscreen</span></div>
            <div class="shortcut-item"><span>M</span> <span>Mute</span></div>
            <div class="shortcut-item"><span>← / →</span> <span>Seek 5s</span></div>
            <div class="shortcut-item"><span>↑ / ↓</span> <span>Volume</span></div>
        </div>
    </div>
</div>

<script src="video.min.js"></script>
<script src="script.js"></script>
</body>
</html>
