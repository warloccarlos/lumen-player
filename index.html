<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumen | Privacy-Focused Player</title>
    
    <link href="video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=1.0.1">
</head>
<body>

    <header>
        <div class="logo">LUMEN</div>
        <div class="header-actions">
            <div class="remote-loader">
                <input type="text" id="remoteUrl" placeholder="Video URL...">
                <button id="loadRemote" class="btn-primary">Load</button>
            </div>
            <label for="fileInput" class="upload-label">Add Media</label>
            <input type="file" id="fileInput" multiple accept="video/*" style="display: none;">
            <button id="togglePlaylist" class="btn-secondary">Playlist</button>
        </div>
    </header>

    <div class="info-bar" id="infoBar">
        <p>⚡ <b>Privacy:</b> Media stays on your device. MP4 is instant; MKV takes a moment to index.</p>
    </div>

    <main class="main-container">
        <div class="player-column">
            <div class="player-wrapper">
                <div class="ratio-keeper">
                    <video id="lumen-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
                </div>
            </div>
        </div>

        <aside class="playlist" id="sidebar">
            <div class="playlist-header">PLAYLIST</div>
            <ul id="playlist"></ul>
        </aside>
    </main>

    <script src="video.min.js"></script>
    <script src="script.js?v=1.0.1"></script>
</body>
</html>
